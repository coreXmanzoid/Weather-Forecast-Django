services:
  - type: web
    name: todo-app
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn dummy.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com
