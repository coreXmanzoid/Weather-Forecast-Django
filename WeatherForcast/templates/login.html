{% extends 'base.html' %}
{% load static %}

{% block title %}
Login | Weather Forecast
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-lg-5 col-md-7">

                <div class="auth-card">

                    <div class="text-center mb-4">

                        <i class="bi bi-cloud-sun-fill auth-logo"></i>

                        <h2 class="mt-3">Welcome Back</h2>

                        <p class="text-muted">

                            Login to continue checking weather updates.

                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Username

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                placeholder="Enter your username"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                placeholder="Enter your password"
                                required>

                        </div>

                        <button class="btn btn-primary w-100">

                            <i class="bi bi-box-arrow-in-right"></i>

                            Login

                        </button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">

                        Don't have an account?

                        <a href="{% url 'signup' %}">

                            Sign Up

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
