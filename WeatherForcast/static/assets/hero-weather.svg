<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="skyGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFE9A8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFE177"/>
      <stop offset="55%" stop-color="#FFC93C"/>
      <stop offset="100%" stop-color="#FFA62B"/>
    </radialGradient>
    <linearGradient id="cloudGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF3FB"/>
    </linearGradient>
    <linearGradient id="cloudGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DCEBFA"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E8BFF"/>
      <stop offset="100%" stop-color="#2C6BE0"/>
    </linearGradient>
    <linearGradient id="cityGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FB3F2"/>
      <stop offset="100%" stop-color="#5C9DEB"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DFF1E6"/>
      <stop offset="100%" stop-color="#C9E9D6"/>
    </linearGradient>
  </defs>

  <!-- soft sun glow -->
  <circle cx="560" cy="160" r="220" fill="url(#skyGlow)"/>

  <!-- city skyline -->
  <g opacity="0.9">
    <rect x="40" y="400" width="46" height="120" rx="4" fill="url(#cityGrad)"/>
    <rect x="96" y="360" width="38" height="160" rx="4" fill="url(#cityGrad)"/>
    <rect x="144" y="420" width="34" height="100" rx="4" fill="url(#cityGrad)"/>
    <rect x="188" y="380" width="30" height="140" rx="4" fill="url(#cityGrad)"/>
    <rect x="600" y="410" width="34" height="110" rx="4" fill="url(#cityGrad)"/>
    <rect x="640" y="370" width="40" height="150" rx="4" fill="url(#cityGrad)"/>
    <rect x="688" y="430" width="30" height="90" rx="4" fill="url(#cityGrad)"/>
    <rect x="724" y="395" width="36" height="125" rx="4" fill="url(#cityGrad)"/>
    <!-- windows -->
    <g fill="#FFFFFF" opacity="0.7">
      <rect x="50" y="412" width="6" height="6" rx="1"/>
      <rect x="64" y="412" width="6" height="6" rx="1"/>
      <rect x="50" y="430" width="6" height="6" rx="1"/>
      <rect x="64" y="430" width="6" height="6" rx="1"/>
      <rect x="104" y="376" width="6" height="6" rx="1"/>
      <rect x="118" y="376" width="6" height="6" rx="1"/>
      <rect x="104" y="394" width="6" height="6" rx="1"/>
      <rect x="118" y="394" width="6" height="6" rx="1"/>
      <rect x="610" y="424" width="6" height="6" rx="1"/>
      <rect x="650" y="386" width="6" height="6" rx="1"/>
      <rect x="664" y="386" width="6" height="6" rx="1"/>
      <rect x="734" y="410" width="6" height="6" rx="1"/>
    </g>
  </g>

  <!-- ground -->
  <path d="M0 520 Q400 490 800 520 L800 600 L0 600 Z" fill="url(#groundGrad)"/>

  <!-- big sun -->
  <circle cx="565" cy="160" r="86" fill="url(#sunGrad)"/>
  <g stroke="#FFC93C" stroke-width="6" stroke-linecap="round">
    <line x1="565" y1="38" x2="565" y2="14"/>
    <line x1="565" y1="282" x2="565" y2="306"/>
    <line x1="443" y1="160" x2="419" y2="160"/>
    <line x1="667" y1="62" x2="684" y2="45"/>
    <line x1="446" y1="62" x2="429" y2="45"/>
    <line x1="667" y1="258" x2="684" y2="275"/>
  </g>

  <!-- wind lines -->
  <g stroke="#9FCBFF" stroke-width="7" stroke-linecap="round" opacity="0.8">
    <path d="M70 200 H170"/>
    <path d="M60 222 H140"/>
    <path d="M85 244 H160"/>
  </g>

  <!-- clouds -->
  <g>
    <ellipse cx="300" cy="230" rx="95" ry="46" fill="url(#cloudGrad1)"/>
    <ellipse cx="250" cy="215" rx="55" ry="42" fill="url(#cloudGrad1)"/>
    <ellipse cx="355" cy="210" rx="60" ry="40" fill="url(#cloudGrad1)"/>
  </g>
  <g>
    <ellipse cx="610" cy="320" rx="78" ry="38" fill="url(#cloudGrad2)"/>
    <ellipse cx="568" cy="306" rx="46" ry="34" fill="url(#cloudGrad2)"/>
    <ellipse cx="652" cy="302" rx="50" ry="32" fill="url(#cloudGrad2)"/>
  </g>

  <!-- rain drops from second cloud -->
  <g fill="#5BA7F7">
    <path d="M560 360 q6 14 0 22 a7 7 0 1 1 -0 -22 z"/>
    <path d="M600 368 q6 14 0 22 a7 7 0 1 1 -0 -22 z"/>
    <path d="M640 360 q6 14 0 22 a7 7 0 1 1 -0 -22 z"/>
  </g>

  <!-- weather card / device -->
  <g>
    <rect x="290" y="330" width="220" height="160" rx="24" fill="url(#cardGrad)"/>
    <rect x="290" y="330" width="220" height="160" rx="24" fill="#FFFFFF" opacity="0.04"/>
    <!-- small sun icon on card -->
    <circle cx="335" cy="372" r="20" fill="#FFD45E"/>
    <g stroke="#FFD45E" stroke-width="4" stroke-linecap="round">
      <line x1="335" y1="344" x2="335" y2="336"/>
      <line x1="335" y1="400" x2="335" y2="408"/>
      <line x1="307" y1="372" x2="299" y2="372"/>
      <line x1="356" y1="351" x2="362" y2="345"/>
      <line x1="356" y1="393" x2="362" y2="399"/>
    </g>
    <ellipse cx="372" cy="378" rx="26" ry="14" fill="#FFFFFF" opacity="0.9"/>

    <!-- temperature text -->
    <text x="305" y="440" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#FFFFFF">28°C</text>
    <text x="305" y="468" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#EAF3FF">Partly Cloudy</text>

    <!-- divider -->
    <line x1="305" y1="478" x2="495" y2="478" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  </g>

  <!-- plants -->
  <g>
    <path d="M120 520 C112 480 70 470 50 480 C70 490 90 505 100 520 Z" fill="#5BBE82"/>
    <path d="M130 520 C140 470 190 462 215 478 C190 484 160 502 145 520 Z" fill="#46A86E"/>
    <rect x="118" y="510" width="10" height="40" rx="3" fill="#3C8E5C"/>
  </g>
  <g>
    <path d="M700 520 C694 488 660 480 644 488 C660 496 676 508 684 520 Z" fill="#5BBE82"/>
    <path d="M708 520 C716 482 754 476 774 489 C754 494 728 508 716 520 Z" fill="#46A86E"/>
    <rect x="698" y="512" width="8" height="32" rx="3" fill="#3C8E5C"/>
  </g>
</svg>
